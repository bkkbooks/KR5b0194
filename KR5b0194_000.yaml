front:
  text: 玉籙資度解壇儀
  hash: sha256:ca04dd0283372329f7caf9e13205a8aa2f13ae61bdb6330f626d839c71801194
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0194_HFL_000-001a, image: hfl/0268/0268-018.png}
body:
  text: 法事如式各禮師存念如法請宣神呪五靈列位煥鎮五方始皇護魂丹老衛形皓靈侍魄黑帝攝生中央黃帝統御萬真元皇誥下幽夜開光罪消北府名列南昌金籙定籍玉字除殃朱陵鍊質飛神太倉三官九府無極神鄉普受開度上生天堂和與道合真鳴法鼓二十四通無上三天玄元始三氣太上道君太上老君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神真臣今解壇言功焚香禮懴謹奏為入意其諸齋悃巳録告聞願得太上至真道氣靈寶慧光下降流入臣等身中令臣所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前請稱法位具位臣姓某等今故燒香皈身皈神皈命太上十方救苦無上慈尊臣聞三籙垂科五篇著範茂弘道旨丕闡玄風法天像地而肇建壇儀呼隂召陽而鎮安雲篆千真降駕萬聖臨軒齋盟上格於層霄真馭下臨於法席用資某靈升真天府證品仙階今則啓願告成朝修事竟解壇散席首過言功荐冀洪恩尊安宗社金龍起篆慶圎滿於醮功玉緯流光降洪厖於景福所啓玄感上徹徑御至真無極道前知磬舉起敬贊十方號禮足各長跪虔誠懴悔臣法衆等志心皈身皈神皈命十方救苦無上慈尊恭望洪慈洞垂巨澤普降洪恩以今解壇散席焚香禮懴臣聞三天播澤靈光舒化育之仁九地承恩祖氣運遷神之德荷宸恩之鑒映幸齋法之周圎庸罄丹忱仰干洪造重念臣等精神混俗容止生塵玉律昭回凜三元之校録金科錯落嚴四極之條章亶冀隆寬恪垂涵育陶靈光於九軌誓暢玄宗流法雨於三途願隆聖造臣等志心稽首禮謝無上至真三寶三啓三禮重稱法位具位臣姓某與臨壇法衆等謹同誠上啓青玄祖氣虛無自然元始天尊太上道君太上老君昊天玉皇上帝紫微天皇大帝紫微北極大帝后土皇地祇東極青玄老君運明保元上帝太乙救苦天尊九幽拔罪天尊十方分身應化救苦天尊大慈大悲救苦真人大惠真人注生真人香林會中法解真人十華真人普救真人三十六部尊經玄中大法師三天大法師三界應感醮筵降格一切威靈臣等野馬微生醯雞陋質荷九宸之錫慶際三洞之開光身綰金符名聮玉籍煙霞攝景盍抗志於清虛日月同流乃棲身於埃𡏖百非未滌萬業猶羈緬惟受道之丹忱常勵濟時之素誓庶俾化育不負生成既奉詞文敢忘關奏臣自今月某日為始欽奉綸音崇修玉籙資度大齋幾晝夜謄詞逹悃降真召靈揚十絶之華幡然九巵之法炬解消結滯落滅冤愆拯度容儀超升陽境葵忱露奏荷三境以流輝芝檢風馳開九幽而御氣銘心罔極刻骨奚殫以今釐事慶成齋功告備天人同慶幽顯相歡羽葆翩翻將返瓊輿之仗虎旌暗藹行收禁路之班盍依格以奏功為關盟而遷賞恩惟玄穹至聖皇極無尊俯覽懇祈曲垂采鑒其有建齋之日上請三洞官屬九天真靈監齋衛真侍經護道虛空監察土地神祇營衛齋功具嚴勞績即玄壇而相表希洪造以酬恩臣等存念不周俯仰未備有五帝四司之校録慮千愆萬過之充周等冀隆慈普蒙矜宥臣誠惶誠恐稽首頓首謹啓以聞宣言功表熏表焚燎宣關宣回將牒遣官如法謹遣臣等身中五體真官官一小吏十二書佐重敕功曹使者飛龍驛吏嚴裝顯服冠帶垂纓磨硯點筆簮劒理籙為臣及時操持表文上詣三天曹治隨事奏對若有謬誤文字脫落言辭倒錯不相次比者請傳言書佐習事小吏操龍頭書刀長毫利筆隨誤正定母令上官典者有所遣卻徑逹三天無極大道太上御前愼勿稽停左吏歷關右吏歷啓以次分别當令臣所請者下所召者到所濟者度所宣者通所遷者逹所願者應所求者得若有下官故氣遏截臣表文不使上逹者收付所在近獄依律治罪以明天憲臣退伏案前伏待報應納官如法臣通誠事竟及建齋之始所出身中功曹使者一切真官仙君吏兵並還臣身中從衆妙門而入在左還左在右還右直日功曹主領檢押還復本位母令差互須召又到一如故事還功報德天尊旋繞一匝師立東面西衆立西面東皆跪講舉長跪還戒如法臣等學法未備俯仰失格進止犯科不合儀式恐為四司所紏五帝所執千愆萬過乞垂赦宥哀原未悟不見罪罰臣等建齋之初奉請智慧上品十戒登齋禁戒以檢身心法事既竟謁還天宮謹上啓以聞伏希昭宥臣等誠惶誠恐稽首頓首再拜謹言舉還戒頌歸位一拜宣三簡投簡畢知磬舉五龍起鎮天尊起鎮發願存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來解壇散席之所自然生金液丹碧芝英百靈衆真交會在此香火爐前當願善功普博齋福周隆十方仙童玉女接侍蘭煙傳臣向來所啓之誠速逹徑御至真無極大道三清上聖昊天金闕玉皇上帝東極慈尊青玄上帝道前解壇頌下壇辭三寶時光迅速日影漸移香散玉華道還金闕皇圗地久聖夀天長和稽首拜辭十方道寶金童進善玉女奏功名挂金牌經藏寶韞神靈升度家國蒙恩聖入虛無功沾幽顯和稽首拜辭十方經寶瓊鍾息響璧磬收聲師返太清名標紫府三途罷對五苦停輪和稽首拜辭十方師寶願諸衆生諸惡莫作衆善奉行不墮劫緑常居盛世有情含識同證無為和稽首拜辭十方衆聖玉籙資度解壇儀
